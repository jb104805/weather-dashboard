<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAISO / PACE Weather Dashboard — Lehi City Power</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; font-size: 13px; background: #F4F6F7; color: #1B2631; }

/* ── Header ── */
header {
  background: #1B2631; color: #fff; padding: 14px 20px 10px;
  display: flex; flex-wrap: wrap; align-items: baseline; gap: 12px;
}
header h1 { font-size: 18px; font-weight: bold; flex: 1 1 auto; }
header .sub { font-size: 11px; color: #AEB6BF; white-space: nowrap; }
#last-refreshed { font-size: 11px; color: #AEB6BF; }

/* ── Controls bar ── */
.controls {
  background: #2C3E50; padding: 8px 20px;
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
}
.tab-btn {
  padding: 5px 18px; border: none; border-radius: 3px; cursor: pointer;
  font-size: 12px; font-weight: bold; background: #566573; color: #fff;
  transition: background 0.15s;
}
.tab-btn.active { background: #E67E22; color: #fff; }
.tab-btn:hover:not(.active) { background: #717D7E; }
.baseline-ctrl {
  margin-left: auto; display: flex; align-items: center; gap: 8px;
  color: #ECF0F1; font-size: 12px; font-weight: bold;
}
.baseline-ctrl select {
  padding: 4px 8px; border-radius: 3px; border: 1px solid #2980B9;
  background: #D6EAF8; color: #1A5276; font-weight: bold; font-size: 12px; cursor: pointer;
}

/* ── Loading / error ── */
#loading { padding: 40px; text-align: center; color: #566573; font-size: 14px; }

/* ── Tab content ── */
.tab-content { display: none; }
.tab-content.active { display: block; }

/* ── Section wrapper ── */
.section { padding: 0 12px 16px; }

/* ── Legend rows ── */
.legend {
  display: flex; align-items: center; gap: 4px;
  padding: 6px 0 4px; flex-wrap: wrap;
}
.legend-label {
  font-size: 11px; font-weight: bold; white-space: nowrap;
  margin-right: 4px; color: #2C3E50;
}
.legend-chip {
  padding: 3px 8px; border-radius: 2px; font-size: 10px;
  font-weight: bold; border: 1px solid rgba(0,0,0,0.1); white-space: nowrap;
}

/* ── Table wrapper (horizontal scroll) ── */
.table-wrap { overflow-x: auto; border-radius: 4px; margin-bottom: 4px; }
table {
  border-collapse: collapse; min-width: 100%;
  table-layout: fixed; font-size: 11px;
}

/* ── Column widths ── */
.col-city  { width: 150px; min-width: 150px; }
.col-date  { width: 72px; min-width: 72px; }
.col-norm  { width: 72px; min-width: 72px; }
.col-div   { width: 8px;  min-width: 8px; background: #BDC3C7; padding: 0; }

/* ── Header rows ── */
th {
  text-align: center; vertical-align: bottom; padding: 4px 2px;
  font-size: 10px; font-weight: bold; color: #fff; border: 1px solid rgba(255,255,255,0.15);
  white-space: nowrap;
}
th.city-hdr {
  background: #1B2631; text-align: left; padding-left: 8px; vertical-align: middle;
}
th.past-hdr  { background: #566573; }
th.today-hdr { background: #E67E22; }
th.future-hdr { background: #2E4057; }
th.norm-hdr  { background: #1E8449; }
th.div-hdr   { background: #BDC3C7; padding: 0; }

/* ── Data cells ── */
td {
  text-align: center; padding: 3px 2px; border: 1px solid #D5D8DC;
  vertical-align: middle; overflow: hidden; white-space: nowrap;
}
td.city-cell {
  text-align: left; padding-left: 8px; font-weight: bold;
  background: #F4F6F7; position: sticky; left: 0; z-index: 1;
  border-right: 2px solid #BDC3C7;
}
td.today-cell { border-left: 2px solid #E67E22 !important; border-right: 2px solid #E67E22 !important; }
td.norm-cell  { background: #D5F5E3; font-weight: bold; }
td.div-cell   { background: #BDC3C7; padding: 0; }
td.empty-cell { background: #F2F3F4; color: #AAAAAA; }

/* ── Group header rows ── */
tr.group-hdr td {
  font-weight: bold; font-size: 10px; color: #2C3E50;
  text-align: left; padding-left: 8px; border-top: 2px solid #BDC3C7;
}

/* ── Section banner rows ── */
tr.section-banner td {
  font-weight: bold; font-size: 11px; color: #fff;
  text-align: left; padding: 5px 10px;
}

/* ── Alternating row colors (applied via JS) ── */
tr.row-even td.city-cell { background: #F4F6F7; }
tr.row-odd  td.city-cell { background: #FDFEFE; }
</style>
</head>
<body>

<header>
  <h1>CAISO / PACE &nbsp; Weather Deviation Dashboard</h1>
  <span class="sub">Lehi City Power Department</span>
  <span id="last-refreshed"></span>
</header>

<div class="controls">
  <button id="tab-btn-geo"  class="tab-btn active" onclick="switchTab('geo')">By Geography</button>
  <button id="tab-btn-load" class="tab-btn"        onclick="switchTab('load')">By Load Size</button>
  <div class="baseline-ctrl">
    Color Baseline:
    <select id="baseline-select" onchange="updateTempColors()">
      <option value="30yr">30-yr</option>
      <option value="10yr">10-yr</option>
      <option value="3yr">3-yr</option>
    </select>
  </div>
</div>

<div id="loading">Loading dashboard data&hellip;</div>

<div id="geo-content"  class="tab-content"></div>
<div id="load-content" class="tab-content"></div>

<script>
// ═══════════════════════════════════════════════════
// COLOR UTILITIES
// ═══════════════════════════════════════════════════
function devColor(d) {
  if (d <= -15) return ['#1A5276','#fff'];
  if (d <= -10) return ['#2980B9','#fff'];
  if (d <=  -5) return ['#AED6F1','#000'];
  if (d <=  -3) return ['#D6EAF8','#000'];
  if (d <    3) return ['#FFFFFF','#000'];
  if (d <    5) return ['#FADBD8','#000'];
  if (d <    8) return ['#F1948A','#000'];
  if (d <   15) return ['#E74C3C','#fff'];
  return ['#922B21','#fff'];
}

function spiColor(spi) {
  if (spi >= 0.85) return '#F39C12';
  if (spi >= 0.65) return '#F7DC6F';
  if (spi >= 0.45) return '#FCF3CF';
  if (spi >= 0.25) return '#D5D8DC';
  return '#AAB7B8';
}

function spiLabel(spi) {
  if (spi >= 0.85) return 'Excellent';
  if (spi >= 0.65) return 'Good';
  if (spi >= 0.45) return 'Moderate';
  if (spi >= 0.25) return 'Poor';
  return 'Very Poor';
}

function windColor(mph) {
  if (mph >= 20) return ['#1E8449','#fff'];
  if (mph >= 15) return ['#58D68D','#000'];
  if (mph >= 10) return ['#A9DFBF','#000'];
  if (mph >=  5) return ['#D5D8DC','#000'];
  return ['#AAB7B8','#000'];
}

function windLabel(mph) {
  if (mph >= 20) return 'Excellent';
  if (mph >= 15) return 'Good';
  if (mph >= 10) return 'Moderate';
  if (mph >=  5) return 'Poor';
  return 'Very Poor';
}

function computeSPI(ghi, cloud) {
  const GHI_CEILING = 9.0, GHI_W = 0.7, CLD_W = 0.3;
  const spi = (ghi / GHI_CEILING) * GHI_W + ((100 - cloud) / 100) * CLD_W;
  return Math.max(0, Math.min(1, spi));
}

function fmtDate(ds) {
  const d = new Date(ds + 'T12:00:00');
  return d.toLocaleDateString('en-US',{month:'short',day:'2-digit'});
}
function fmtDay(ds) {
  const d = new Date(ds + 'T12:00:00');
  return d.toLocaleDateString('en-US',{weekday:'short'});
}

// ═══════════════════════════════════════════════════
// DATA & STATE
// ═══════════════════════════════════════════════════
let D = null; // loaded data.json
let currentTab = 'geo';

function baseline() { return document.getElementById('baseline-select').value; }

// ═══════════════════════════════════════════════════
// LEGEND BUILDER
// ═══════════════════════════════════════════════════
function buildTempLegend() {
  const chips = [
    {label:'≤-15°F', bg:'#1A5276', fg:'#fff'},
    {label:'-10°F',  bg:'#2980B9', fg:'#fff'},
    {label:'-5°F',   bg:'#AED6F1', fg:'#000'},
    {label:'-3°F',   bg:'#D6EAF8', fg:'#000'},
    {label:'0°F',    bg:'#FFFFFF', fg:'#000'},
    {label:'+3°F',   bg:'#FADBD8', fg:'#000'},
    {label:'+5°F',   bg:'#F1948A', fg:'#000'},
    {label:'+8°F',   bg:'#E74C3C', fg:'#fff'},
    {label:'≥+15°F', bg:'#922B21', fg:'#fff'},
  ];
  const div = document.createElement('div');
  div.className = 'legend';
  div.innerHTML = '<span class="legend-label">Deviation from Normal High &rarr;</span>';
  chips.forEach(c => {
    const s = document.createElement('span');
    s.className = 'legend-chip';
    s.textContent = c.label;
    s.style.background = c.bg;
    s.style.color = c.fg;
    div.appendChild(s);
  });
  return div;
}

function buildSolarLegend() {
  const chips = [
    {label:'Excellent', bg:'#F39C12', fg:'#000'},
    {label:'Good',      bg:'#F7DC6F', fg:'#000'},
    {label:'Moderate',  bg:'#FCF3CF', fg:'#000'},
    {label:'Poor',      bg:'#D5D8DC', fg:'#000'},
    {label:'Very Poor', bg:'#AAB7B8', fg:'#000'},
  ];
  const div = document.createElement('div');
  div.className = 'legend';
  div.innerHTML = '<span class="legend-label">Solar Production Potential &rarr;</span>';
  chips.forEach(c => {
    const s = document.createElement('span');
    s.className = 'legend-chip';
    s.textContent = c.label;
    s.style.background = c.bg;
    s.style.color = c.fg;
    div.appendChild(s);
  });
  return div;
}

function buildWindLegend() {
  const chips = [
    {label:'Excellent', bg:'#1E8449', fg:'#fff'},
    {label:'Good',      bg:'#58D68D', fg:'#000'},
    {label:'Moderate',  bg:'#A9DFBF', fg:'#000'},
    {label:'Poor',      bg:'#D5D8DC', fg:'#000'},
    {label:'Very Poor', bg:'#AAB7B8', fg:'#000'},
  ];
  const div = document.createElement('div');
  div.className = 'legend';
  div.innerHTML = '<span class="legend-label">Wind Production Potential &rarr;</span>';
  chips.forEach(c => {
    const s = document.createElement('span');
    s.className = 'legend-chip';
    s.textContent = c.label;
    s.style.background = c.bg;
    s.style.color = c.fg;
    div.appendChild(s);
  });
  return div;
}

// ═══════════════════════════════════════════════════
// TABLE HEADER BUILDER
// ═══════════════════════════════════════════════════
function buildTableHead(table) {
  const thead = table.createTHead();
  const r1 = thead.insertRow(), r2 = thead.insertRow();

  // City column
  [r1,r2].forEach((r,i) => {
    const th = document.createElement('th');
    th.className = 'city-hdr col-city';
    th.textContent = i === 0 ? 'City' : '';
    th.rowSpan = i === 0 ? 1 : 1;
    r.appendChild(th);
  });

  // Date columns
  D.dates.forEach(ds => {
    const isToday = ds === D.today;
    const isPast  = ds < D.today;
    const cls = isToday ? 'today-hdr' : (isPast ? 'past-hdr' : 'future-hdr');

    const th1 = document.createElement('th');
    th1.className = `${cls} col-date`;
    th1.textContent = fmtDate(ds);
    r1.appendChild(th1);

    const th2 = document.createElement('th');
    th2.className = `${cls} col-date`;
    th2.textContent = fmtDay(ds);
    r2.appendChild(th2);
  });

  // Divider
  [r1,r2].forEach(r => {
    const th = document.createElement('th');
    th.className = 'div-hdr col-div'; r.appendChild(th);
  });

  // Norm columns
  [['30-yr','Norm'],['10-yr','Norm'],['3-yr','Norm']].forEach(([top,bot]) => {
    const th1 = document.createElement('th');
    th1.className = 'norm-hdr col-norm'; th1.textContent = top; r1.appendChild(th1);
    const th2 = document.createElement('th');
    th2.className = 'norm-hdr col-norm'; th2.textContent = bot; r2.appendChild(th2);
  });
}

// ═══════════════════════════════════════════════════
// TEMPERATURE TABLE
// ═══════════════════════════════════════════════════
const GEO_GROUPS = ['Northern CA','Central CA','Southern CA','Outside CA'];
const GEO_COLORS = {
  'Northern CA':'#D4E6F1','Central CA':'#D5F5E3',
  'Southern CA':'#FADBD8','Outside CA':'#FEF9E7'
};
const LOAD_GROUPS = [['High Load',1],['Medium Load',2],['Low Load',3]];
const LOAD_COLORS = {'High Load':'#FADBD8','Medium Load':'#FEF9E7','Low Load':'#D4E6F1'};

function getGroups(tabType) {
  if (tabType === 'geo') {
    const groups = {};
    GEO_GROUPS.forEach(g => groups[g] = []);
    D.cities.forEach(c => { (groups[c.geo] = groups[c.geo]||[]).push(c); });
    return GEO_GROUPS.map(g => ({label:g, color:GEO_COLORS[g], cities:groups[g]||[]}));
  } else {
    const groups = {};
    LOAD_GROUPS.forEach(([l]) => groups[l] = []);
    D.cities.forEach(c => {
      const label = LOAD_GROUPS.find(([,r]) => r === c.load)?.[0] || 'Low Load';
      (groups[label] = groups[label]||[]).push(c);
    });
    return LOAD_GROUPS.map(([l,]) => ({label:l, color:LOAD_COLORS[l], cities:groups[l]||[]}));
  }
}

function buildTempTable(tabType) {
  const table = document.createElement('table');
  buildTableHead(table);
  const tbody = table.createTBody();
  const norms = D.normals;
  const month = new Date(D.today + 'T12:00:00').getMonth();
  let rowIdx = 0;

  getGroups(tabType).forEach(({label, color, cities}) => {
    if (!cities.length) return;

    // Group header row
    const ghTr = tbody.insertRow();
    ghTr.className = 'group-hdr';
    const ghTd = ghTr.insertCell();
    ghTd.colSpan = 2 + D.dates.length + 1 + 3;
    ghTd.textContent = '\u25B8  ' + label.toUpperCase();
    ghTd.style.background = color;

    cities.forEach(city => {
      const tr = tbody.insertRow();
      tr.className = rowIdx++ % 2 === 0 ? 'row-even' : 'row-odd';

      // City name
      const nameTd = tr.insertCell();
      nameTd.className = 'city-cell';
      nameTd.textContent = city.full;

      // Date cells
      D.dates.forEach(ds => {
        const td = tr.insertCell();
        td.dataset.city  = city.key;
        td.dataset.date  = ds;
        td.dataset.month = month;
        td.className = 'temp-cell' + (ds === D.today ? ' today-cell' : '');
        const temps = D.city_weather[city.key]?.[ds];
        if (temps) {
          td.textContent = `${temps[0]}/${temps[1]}`;
          applyTempColor(td, city.key, ds, month, baseline());
        } else {
          td.textContent = '—'; td.className += ' empty-cell';
        }
      });

      // Divider
      const divTd = tr.insertCell(); divTd.className = 'div-cell';

      // Norm columns (30-yr, 10-yr, 3-yr)
      [norms.temp_30yr, norms.temp_10yr, norms.temp_3yr].forEach(normSet => {
        const td = tr.insertCell();
        td.className = 'norm-cell';
        const v = normSet?.[city.key]?.[month];
        td.textContent = v && v[0] != null ? `${v[0]}/${v[1]}` : '—';
      });
    });
  });

  return table;
}

function applyTempColor(td, cityKey, dateStr, month, bl) {
  const temps = D.city_weather[cityKey]?.[dateStr];
  if (!temps) return;
  const hi = temps[0];
  const normSets = {
    '30yr': D.normals.temp_30yr,
    '10yr': D.normals.temp_10yr,
    '3yr':  D.normals.temp_3yr,
  };
  const normVal = normSets[bl]?.[cityKey]?.[month]?.[0];
  if (normVal == null) { td.style.background='#fff'; td.style.color='#000'; return; }
  const dev = hi - normVal;
  const [bg, fg] = devColor(dev);
  td.style.background = bg;
  td.style.color = fg;
  td.title = `${dev > 0 ? '+' : ''}${dev}°F vs ${bl} normal`;
}

function updateTempColors() {
  const bl = baseline();
  document.querySelectorAll('td.temp-cell').forEach(td => {
    applyTempColor(td, td.dataset.city, td.dataset.date, parseInt(td.dataset.month), bl);
  });
}

// ═══════════════════════════════════════════════════
// SOLAR TABLE
// ═══════════════════════════════════════════════════
function buildSolarTable() {
  const table = document.createElement('table');
  buildTableHead(table);
  const tbody = table.createTBody();
  const month = new Date(D.today + 'T12:00:00').getMonth();

  // Section banner
  const bannerTr = tbody.insertRow();
  bannerTr.className = 'section-banner';
  const bannerTd = bannerTr.insertCell();
  bannerTd.colSpan = 2 + D.dates.length + 1 + 3;
  bannerTd.style.background = '#E67E22';
  bannerTd.textContent = '\u2600  SOLAR GENERATION  \u2014  GHI (kWh/m\u00B2) / Cloud%';

  D.solar_cities.forEach((city, idx) => {
    const tr = tbody.insertRow();
    tr.style.background = idx % 2 === 0 ? '#FFFDE7' : '#FFF9C4';

    const nameTd = tr.insertCell();
    nameTd.className = 'city-cell';
    nameTd.style.background = idx % 2 === 0 ? '#FFFDE7' : '#FFF9C4';
    nameTd.textContent = city.full;

    D.dates.forEach(ds => {
      const td = tr.insertCell();
      td.className = ds === D.today ? 'today-cell' : '';
      const data = D.solar_weather[city.key]?.[ds];
      if (data) {
        const [ghi, cloud] = data;
        const spi = computeSPI(ghi, cloud);
        td.textContent = `${ghi.toFixed(1)} / ${cloud.toFixed(0)}%`;
        td.style.background = spiColor(spi);
        td.style.color = '#000';
        td.title = `SPI: ${spi.toFixed(2)} — ${spiLabel(spi)}`;
      } else {
        td.textContent = '—'; td.className += ' empty-cell';
      }
    });

    const divTd = tr.insertCell(); divTd.className = 'div-cell';

    // Ref columns: U=10yr, V=10yr, W=3yr
    const s10 = D.normals.solar_10yr?.[city.key]?.[month];
    const s3  = D.normals.solar_3yr?.[city.key]?.[month];
    [s10, s10, s3].forEach(v => {
      const td = tr.insertCell();
      td.className = 'norm-cell';
      td.style.background = '#FFF9C4';
      td.textContent = v != null ? v.toFixed(1) : '—';
    });
  });

  return table;
}

// ═══════════════════════════════════════════════════
// WIND TABLE
// ═══════════════════════════════════════════════════
function buildWindTable() {
  const table = document.createElement('table');
  buildTableHead(table);
  const tbody = table.createTBody();
  const month = new Date(D.today + 'T12:00:00').getMonth();

  // Section banner
  const bannerTr = tbody.insertRow();
  bannerTr.className = 'section-banner';
  const bannerTd = bannerTr.insertCell();
  bannerTd.colSpan = 2 + D.dates.length + 1 + 3;
  bannerTd.style.background = '#1E8449';
  bannerTd.textContent = '\uD83D\uDCA8  WIND  \u2014  Daytime Avg 80m (mph)';

  D.wind_cities.forEach((city, idx) => {
    const tr = tbody.insertRow();
    tr.style.background = idx % 2 === 0 ? '#EAFAF1' : '#D5F5E3';

    const nameTd = tr.insertCell();
    nameTd.className = 'city-cell';
    nameTd.style.background = idx % 2 === 0 ? '#EAFAF1' : '#D5F5E3';
    nameTd.textContent = city.full;

    D.dates.forEach(ds => {
      const td = tr.insertCell();
      td.className = ds === D.today ? 'today-cell' : '';
      const spd = D.wind_weather[city.key]?.[ds];
      if (spd != null) {
        const [bg, fg] = windColor(spd);
        td.textContent = `${spd.toFixed(0)} mph`;
        td.style.background = bg;
        td.style.color = fg;
        td.title = windLabel(spd);
      } else {
        td.textContent = '—'; td.className += ' empty-cell';
      }
    });

    const divTd = tr.insertCell(); divTd.className = 'div-cell';

    // Ref columns: U=10yr, V=10yr, W=3yr
    const w10 = D.normals.wind_10yr?.[city.key]?.[month];
    const w3  = D.normals.wind_3yr?.[city.key]?.[month];
    [w10, w10, w3].forEach(v => {
      const td = tr.insertCell();
      td.className = 'norm-cell';
      td.style.background = '#D5F5E3';
      td.textContent = v != null ? `${v.toFixed(0)} mph` : '—';
    });
  });

  return table;
}

// ═══════════════════════════════════════════════════
// TAB RENDERER
// ═══════════════════════════════════════════════════
function renderTab(tabType) {
  const container = document.getElementById(`${tabType}-content`);
  container.innerHTML = '';

  const section = document.createElement('div');
  section.className = 'section';

  // Temperature
  section.appendChild(buildTempLegend());
  const tempWrap = document.createElement('div');
  tempWrap.className = 'table-wrap';
  tempWrap.appendChild(buildTempTable(tabType));
  section.appendChild(tempWrap);

  // Solar
  section.appendChild(document.createElement('br'));
  section.appendChild(buildSolarLegend());
  const solarWrap = document.createElement('div');
  solarWrap.className = 'table-wrap';
  solarWrap.appendChild(buildSolarTable());
  section.appendChild(solarWrap);

  // Wind
  section.appendChild(document.createElement('br'));
  section.appendChild(buildWindLegend());
  const windWrap = document.createElement('div');
  windWrap.className = 'table-wrap';
  windWrap.appendChild(buildWindTable());
  section.appendChild(windWrap);

  container.appendChild(section);
}

// ═══════════════════════════════════════════════════
// TAB SWITCHING
// ═══════════════════════════════════════════════════
function switchTab(tabType) {
  currentTab = tabType;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById(`tab-btn-${tabType}`).classList.add('active');
  document.getElementById(`${tabType}-content`).classList.add('active');
}

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
async function init() {
  try {
    const res = await fetch('data.json');
    const raw = await res.json();

    if (raw.pending || !raw.today) {
      document.getElementById('loading').innerHTML =
        '<strong>Dashboard not yet initialized.</strong><br>' +
        'Go to your GitHub repository &rarr; Actions &rarr; "Refresh Weather Dashboard" &rarr; Run workflow.';
      return;
    }

    D = raw;
    document.getElementById('loading').style.display = 'none';
    document.getElementById('last-refreshed').textContent = 'Last refreshed: ' + D.last_refreshed;

    renderTab('geo');
    renderTab('load');
    switchTab('geo');

  } catch (err) {
    document.getElementById('loading').innerHTML =
      'Error loading dashboard data: ' + err.message +
      '<br><small>Make sure data.json exists in the same directory as index.html.</small>';
  }
}

init();
</script>
</body>
</html>
